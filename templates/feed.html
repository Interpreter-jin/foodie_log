{% extends "base.html" %}
{% block title %}홈 피드 — FoodieLog{% endblock %}

{% block content %}
<main class="page" id="feed-page">
  <!-- Hero Banner -->
  <div class="hero">
    <div class="hero-greeting">안녕하세요 👋</div>
    <div class="hero-title">오늘은 어떤 <span>맛집</span>을<br>다녀오셨나요?</div>
    <div class="hero-stats" id="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-num" id="stat-posts">-</div>
        <div class="hero-stat-label">총 리뷰</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="stat-members">-</div>
        <div class="hero-stat-label">팀원</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="stat-this-week">-</div>
        <div class="hero-stat-label">이번 주</div>
      </div>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="category-scroll" id="cat-tabs">
    <button class="cat-chip active" data-cat="all">🍽️ 전체</button>
    <button class="cat-chip" data-cat="한식">🍚 한식</button>
    <button class="cat-chip" data-cat="중식">🥢 중식</button>
    <button class="cat-chip" data-cat="양식">🍝 양식</button>
    <button class="cat-chip" data-cat="퓨전">🌮 퓨전</button>
    <button class="cat-chip" data-cat="카페">☕ 카페</button>
  </div>

  <!-- Posts -->
  <div class="container">
    <div id="posts-loading">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div id="posts-list" class="hidden"></div>
    <div id="posts-empty" class="empty-state hidden">
      <div class="empty-icon">🍽️</div>
      <div class="empty-text">아직 리뷰가 없어요</div>
      <div class="empty-sub">첫 번째 맛집 후기를 남겨보세요!</div>
    </div>
    <div id="load-more-wrap" class="hidden" style="text-align:center;padding:16px 0;">
      <button id="load-more-btn" onclick="loadMore()" style="padding:10px 28px;border-radius:24px;border:1.5px solid var(--border);font-size:14px;font-weight:700;color:var(--text-muted);background:var(--surface);">더 보기</button>
    </div>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script>
let currentCat = 'all';
let lastDocId = null;
let isLoading = false;

async function loadPosts(reset = false) {
  if (isLoading) return;
  isLoading = true;
  if (reset) {
    lastDocId = null;
    document.getElementById('posts-list').innerHTML = '';
    document.getElementById('posts-loading').classList.remove('hidden');
    document.getElementById('posts-list').classList.add('hidden');
    document.getElementById('posts-empty').classList.add('hidden');
    document.getElementById('load-more-wrap').classList.add('hidden');
  }

  const params = new URLSearchParams({ category: currentCat, limit: 10 });
  if (lastDocId) params.append('lastDocId', lastDocId);

  const data = await fetch(`/api/posts?${params}`).then(r => r.json());
  document.getElementById('posts-loading').classList.add('hidden');

  if (data.success) {
    const list = document.getElementById('posts-list');
    list.classList.remove('hidden');
    if (data.posts.length === 0 && reset) {
      document.getElementById('posts-empty').classList.remove('hidden');
    } else {
      list.insertAdjacentHTML('beforeend', data.posts.map(renderPostCard).join(''));
      if (data.posts.length === 10) {
        lastDocId = data.posts[data.posts.length - 1].id;
        document.getElementById('load-more-wrap').classList.remove('hidden');
      } else {
        document.getElementById('load-more-wrap').classList.add('hidden');
      }
    }
    loadStats();
  }
  isLoading = false;
}

function loadMore() { loadPosts(false); }

async function loadStats() {
  const all = await fetch('/api/posts?limit=1000').then(r => r.json());
  if (all.success) {
    document.getElementById('stat-posts').textContent = all.posts.length;
    const uids = new Set(all.posts.map(p => p.authorUid));
    document.getElementById('stat-members').textContent = uids.size;
    const week = all.posts.filter(p => {
      if (!p.createdAt) return false;
      return (Date.now() - new Date(p.createdAt)) < 7 * 86400000;
    }).length;
    document.getElementById('stat-this-week').textContent = week;
  }
}

// Category tabs
document.getElementById('cat-tabs').addEventListener('click', e => {
  const chip = e.target.closest('.cat-chip');
  if (!chip) return;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentCat = chip.dataset.cat;
  loadPosts(true);
});

// Auth guard
(async () => {
  const config = await fetch('/api/firebase-config').then(r => r.json());
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
  const app = initializeApp(config);
  const auth = getAuth(app);
  window._authInstance = auth;

  onAuthStateChanged(auth, user => {
    if (!user) { location.href = '/'; return; }
    // Update nav avatar
    const av = document.getElementById('nav-user-avatar');
    if (av) {
      if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      else av.textContent = (user.displayName || user.email || '?').charAt(0).toUpperCase();
    }
    // Update greeting
    const name = user.displayName ? user.displayName.split(' ')[0] : '팀원';
    document.querySelector('.hero-greeting').textContent = `${name}님 안녕하세요 👋`;
    loadPosts(true);
  });
})();

// Override getIdToken for feed page
async function getIdToken() {
  const auth = window._authInstance;
  if (!auth || !auth.currentUser) return null;
  return auth.currentUser.getIdToken();
}
</script>
{% endblock %}
