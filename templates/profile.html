{% extends "base.html" %}
{% block title %}프로필 — FoodieLog{% endblock %}

{% block head %}
<style>
  .profile-page { padding-top: var(--nav-h); }
  .logout-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    background: var(--surface); border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; color: var(--text-muted);
    border: 1.5px solid var(--border);
    width: 100%; margin-top: 8px;
  }
  .logout-btn:active { background: var(--surface2); }
  .my-posts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mini-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .mini-card:active { opacity: .85; }
  .mini-img { aspect-ratio: 1; background: var(--surface2); overflow: hidden; }
  .mini-img img { width: 100%; height: 100%; object-fit: cover; }
  .mini-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    background: linear-gradient(135deg, #FFF0F3, #FFE4EC);
  }
  .mini-info { padding: 8px 10px; }
  .mini-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-meta { font-size: 11px; color: var(--text-light); margin-top: 2px; }
</style>
{% endblock %}

{% block content %}
<main class="page profile-page" id="profile-page">
  <div id="profile-loading" style="text-align:center;padding:60px 0;"><div class="spinner"></div></div>
  <div id="profile-content" class="hidden">
    <div class="profile-header">
      <div class="profile-avatar" id="p-avatar">?</div>
      <div class="profile-name" id="p-name">로딩 중...</div>
      <div style="font-size:13px;color:rgba(255,255,255,.7);margin-top:4px" id="p-email"></div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-num" id="p-post-count">0</div>
          <div class="profile-stat-label">리뷰</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num" id="p-like-count">0</div>
          <div class="profile-stat-label">받은 공감</div>
        </div>
      </div>
    </div>

    <div class="container" style="margin-top:16px">
      <div style="font-size:16px;font-weight:800;margin-bottom:12px">내가 쓴 후기</div>
      <div id="my-posts-loading"><div class="spinner" style="width:24px;height:24px;margin:12px auto"></div></div>
      <div class="my-posts-grid hidden" id="my-posts-grid"></div>
      <div class="empty-state hidden" id="my-posts-empty">
        <div class="empty-icon">🍽️</div>
        <div class="empty-text">아직 작성한 후기가 없어요</div>
        <div class="empty-sub">첫 맛집 후기를 남겨보세요!</div>
      </div>

      <div style="margin-top:20px">
        <button class="logout-btn" onclick="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          로그아웃
        </button>
      </div>
    </div>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script>
const CAT_EMOJI = {'한식':'🍚','중식':'🥢','양식':'🍝','퓨전':'🌮','카페':'☕'};

async function loadProfile(user) {
  // Update UI
  const av = document.getElementById('p-avatar');
  if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  else av.textContent = (user.displayName||user.email||'?').charAt(0).toUpperCase();

  document.getElementById('p-name').textContent = user.displayName || '이름 없음';
  document.getElementById('p-email').textContent = user.email || '';

  document.getElementById('profile-loading').classList.add('hidden');
  document.getElementById('profile-content').classList.remove('hidden');

  // Load posts
  const token = await getIdToken();
  const res = await fetch('/api/user/posts', {
    headers: { 'Authorization': `Bearer ${token}` }
  }).then(r=>r.json());

  document.getElementById('my-posts-loading').classList.add('hidden');

  if (res.success && res.posts.length > 0) {
    const totalLikes = res.posts.reduce((s,p) => s+(p.likeCount||0), 0);
    document.getElementById('p-post-count').textContent = res.posts.length;
    document.getElementById('p-like-count').textContent = totalLikes;

    const grid = document.getElementById('my-posts-grid');
    grid.classList.remove('hidden');
    grid.innerHTML = res.posts.map(p => `
      <div class="mini-card" onclick="location.href='/post/${p.id}'">
        <div class="mini-img">
          ${(p.imageUrls||[]).length > 0
            ? `<img src="${p.imageUrls[0]}" alt="음식 사진" loading="lazy">`
            : `<div class="mini-img-placeholder">${CAT_EMOJI[p.category]||'🍽️'}</div>`}
        </div>
        <div class="mini-info">
          <div class="mini-name">${p.restaurantName||'식당'}</div>
          <div class="mini-meta">⭐ ${p.rating||0} · ❤️ ${p.likeCount||0}</div>
        </div>
      </div>`).join('');
  } else {
    document.getElementById('my-posts-empty').classList.remove('hidden');
  }
}

async function logout() {
  if (!confirm('로그아웃 하시겠어요?')) return;
  const { signOut } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
  await signOut(window._authInstance);
  location.href = '/';
}

(async () => {
  const config = await fetch('/api/firebase-config').then(r=>r.json());
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
  const app = initializeApp(config);
  const auth = getAuth(app);
  window._authInstance = auth;
  onAuthStateChanged(auth, user => {
    if (!user) { location.href = '/'; return; }
    // Nav avatar
    const nav = document.getElementById('nav-user-avatar');
    if (nav) {
      if (user.photoURL) nav.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      else nav.textContent = (user.displayName||user.email||'?').charAt(0).toUpperCase();
    }
    loadProfile(user);
  });
})();

async function getIdToken() {
  const auth = window._authInstance;
  if (!auth || !auth.currentUser) return null;
  return auth.currentUser.getIdToken();
}
</script>
{% endblock %}
