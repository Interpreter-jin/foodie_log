<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#E8003D">
  <title>FoodieLog — 팀 맛집 커뮤니티</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
  <style>
    .auth-wrap { padding-top: 0; }
    .bg-deco {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden;
    }
    .deco-circle {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.08);
    }
    .d1 { width: 280px; height: 280px; top: -80px; right: -60px; }
    .d2 { width: 180px; height: 180px; bottom: 120px; left: -40px; }
    .d3 { width: 100px; height: 100px; top: 50%; right: 20px; }
    .features { display: flex; gap: 10px; margin-top: 20px; }
    .feature {
      flex: 1;
      background: rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .feature-icon { font-size: 22px; margin-bottom: 4px; }
    .feature-text { font-size: 11px; color: rgba(255,255,255,.9); font-weight: 600; }
  </style>
</head>
<body style="background: linear-gradient(160deg, #E8003D 0%, #FF1A52 40%, #FF6B35 100%); min-height:100vh;">
  <div class="bg-deco">
    <div class="deco-circle d1"></div>
    <div class="deco-circle d2"></div>
    <div class="deco-circle d3"></div>
  </div>

  <div class="auth-wrap">
    <div class="auth-logo">
      <div style="font-size:64px;margin-bottom:8px;">🍽️</div>
      <div class="auth-logo-text">Foodie<span>Log</span></div>
      <div class="auth-tagline">팀원들과 맛집을 공유하세요</div>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">⭐</div>
          <div class="feature-text">별점 리뷰</div>
        </div>
        <div class="feature">
          <div class="feature-icon">📸</div>
          <div class="feature-text">사진 공유</div>
        </div>
        <div class="feature">
          <div class="feature-icon">❤️</div>
          <div class="feature-text">공감 반응</div>
        </div>
      </div>
    </div>

    <div class="auth-card">
      <div id="login-view">
        <div class="auth-title">로그인</div>
        <div class="auth-subtitle">팀 맛집 커뮤니티에 오신 걸 환영해요!</div>

        <!-- 이메일 로그인 -->
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" id="login-email" class="form-input" placeholder="이메일을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" id="login-password" class="form-input" placeholder="비밀번호를 입력하세요">
        </div>
        <button class="submit-btn" onclick="loginEmail()">로그인</button>

        <div class="auth-divider">또는</div>

        <button class="google-btn" onclick="loginGoogle()">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google로 로그인
        </button>

        <div class="auth-divider">계정이 없으신가요?</div>
        <button onclick="showSignup()" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid #E8003D;color:#E8003D;font-size:15px;font-weight:700;background:#FFF0F3;">회원가입</button>
      </div>

      <div id="signup-view" class="hidden">
        <div class="auth-title">회원가입</div>
        <div class="auth-subtitle">닉네임과 이메일로 간편하게 시작하세요</div>

        <div class="form-group">
          <label class="form-label">닉네임</label>
          <input type="text" id="signup-name" class="form-input" placeholder="사용할 닉네임을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" id="signup-email" class="form-input" placeholder="이메일을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 (6자 이상)</label>
          <input type="password" id="signup-password" class="form-input" placeholder="비밀번호를 입력하세요">
        </div>
        <button class="submit-btn" onclick="signupEmail()">가입하기</button>
        <div class="auth-divider"></div>
        <button onclick="showLogin()" style="width:100%;text-align:center;color:#6B7280;font-size:14px;font-weight:600;">← 로그인으로 돌아가기</button>
      </div>
    </div>
  </div>

  <script>
    // Firebase 초기화 후 로그인 상태 확인
    (async () => {
      const config = await fetch('/api/firebase-config').then(r => r.json());
      if (!config.projectId) {
        document.querySelector('.auth-subtitle').textContent = '⚠️ Firebase 설정을 확인해주세요 (.env 파일의 FIREBASE_API_KEY 등)';
        return;
      }
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider,
              createUserWithEmailAndPassword, signInWithEmailAndPassword,
              updateProfile } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');

      const app = initializeApp(config);
      const auth = getAuth(app);

      window._auth = auth;
      window._GoogleProvider = GoogleAuthProvider;
      window._signInWithPopup = signInWithPopup;
      window._createUser = createUserWithEmailAndPassword;
      window._signInEmail = signInWithEmailAndPassword;
      window._updateProfile = updateProfile;

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          const idToken = await user.getIdToken();
          await fetch('/api/verify-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken })
          });
          location.href = '/feed';
        }
      });
    })();

    function showSignup() {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('signup-view').classList.remove('hidden');
    }
    function showLogin() {
      document.getElementById('signup-view').classList.add('hidden');
      document.getElementById('login-view').classList.remove('hidden');
    }

    async function loginGoogle() {
      try {
        const provider = new window._GoogleProvider();
        await window._signInWithPopup(window._auth, provider);
      } catch (e) {
        alert('Google 로그인 실패: ' + e.message);
      }
    }

    async function loginEmail() {
      const email = document.getElementById('login-email').value.trim();
      const pw = document.getElementById('login-password').value;
      if (!email || !pw) { alert('이메일과 비밀번호를 입력해주세요.'); return; }
      try {
        await window._signInEmail(window._auth, email, pw);
      } catch (e) {
        alert('로그인 실패: ' + (e.code === 'auth/invalid-credential' ? '이메일 또는 비밀번호가 틀렸습니다.' : e.message));
      }
    }

    async function signupEmail() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const pw = document.getElementById('signup-password').value;
      if (!name || !email || !pw) { alert('모든 항목을 입력해주세요.'); return; }
      if (pw.length < 6) { alert('비밀번호는 6자 이상이어야 합니다.'); return; }
      try {
        const cred = await window._createUser(window._auth, email, pw);
        await window._updateProfile(cred.user, { displayName: name });
      } catch (e) {
        alert('회원가입 실패: ' + (e.code === 'auth/email-already-in-use' ? '이미 사용 중인 이메일입니다.' : e.message));
      }
    }
  </script>
</body>
</html>
