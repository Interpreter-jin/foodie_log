{% extends "base.html" %}
{% block title %}맛집 후기 — FoodieLog{% endblock %}

{% block head %}
<style>
  .detail-wrap { padding-bottom: calc(var(--bottom-h) + 60px); }
  .back-btn {
    position: absolute; top: 0; left: 0;
    width: 38px; height: 38px;
    background: rgba(0,0,0,.35);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; margin: 12px;
    backdrop-filter: blur(4px);
  }
</style>
{% endblock %}

{% block content %}
<main class="page detail-wrap" id="detail-page">
  <div id="detail-loading" style="text-align:center;padding:60px 0;">
    <div class="spinner"></div>
  </div>
  <div id="detail-content" class="hidden"></div>
</main>

<!-- Comment input bar (fixed at bottom above nav) -->
<div class="comment-input-bar" id="comment-bar" style="display:none">
  <div class="avatar" id="comment-avatar" style="width:32px;height:32px;font-size:13px;flex-shrink:0;">?</div>
  <input type="text" id="comment-input" class="comment-input" placeholder="댓글을 입력하세요...">
  <button class="comment-send-btn" onclick="sendComment()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>
{% endblock %}

{% block scripts %}
<script>
const POST_ID = '{{ post_id }}';
let currentUser = null;

function renderStars(rating) {
  return Array.from({length:5},(_,i)=>`<span class="star ${i<rating?'filled':'empty'}">${i<rating?'★':'☆'}</span>`).join('');
}

function timeAgo(s) {
  if (!s) return '';
  const d = new Date(s), diff = (Date.now()-d)/1000;
  if(isNaN(d))return '';
  if(diff<60)return '방금 전';
  if(diff<3600)return Math.floor(diff/60)+'분 전';
  if(diff<86400)return Math.floor(diff/3600)+'시간 전';
  if(diff<604800)return Math.floor(diff/86400)+'일 전';
  return d.toLocaleDateString('ko-KR');
}

async function loadPost() {
  const res = await fetch(`/api/posts/${POST_ID}`).then(r=>r.json());
  if (!res.success) {
    document.getElementById('detail-loading').innerHTML = '<div class="empty-state"><div class="empty-icon">😢</div><div class="empty-text">포스트를 찾을 수 없습니다</div></div>';
    return;
  }
  const p = res.post;
  const images = p.imageUrls || [];

  const imagesHtml = images.length > 0 ? `
    <div class="detail-images">
      <div class="detail-image-slider" id="img-slider">
        ${images.map(url=>`<div class="detail-image-slide"><img src="${url}" alt="음식 사진" loading="lazy"></div>`).join('')}
      </div>
      ${images.length > 1 ? `<div class="image-dots">${images.map((_,i)=>`<div class="image-dot ${i===0?'active':''}" data-i="${i}"></div>`).join('')}</div>` : ''}
    </div>` : '';

  const tagsHtml = (p.tags||[]).length>0
    ? `<div class="tag-row" style="padding:0 16px 8px">${p.tags.map(t=>`<span class="mention-tag">@${t}</span>`).join('')}</div>`
    : '';

  const catEmojis = {'한식':'🍚','중식':'🥢','양식':'🍝','퓨전':'🌮','카페':'☕'};

  const authorInitial = (p.authorName||'?').charAt(0).toUpperCase();
  const authorAvatar = p.authorPhoto
    ? `<img src="${p.authorPhoto}" alt="${p.authorName}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : authorInitial;

  document.getElementById('detail-content').innerHTML = `
    <div style="position:relative">
      <a href="/feed" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      ${imagesHtml}
    </div>

    <div class="detail-restaurant">
      <div class="detail-rest-name">${p.restaurantName||''}</div>
      <div class="stars-row" style="margin:8px 0">
        <div class="stars">${renderStars(p.rating||0)}</div>
        <span class="rating-num" style="font-size:16px;font-weight:900">${p.rating||0}.0</span>
      </div>
      <div class="detail-meta">
        <span class="detail-chip category">${catEmojis[p.category]||'🍽️'} ${p.category||''}</span>
        ${p.menu?`<span class="detail-chip">🍴 ${p.menu}</span>`:''}
        ${p.location?`<span class="detail-chip">📍 ${p.location}</span>`:''}
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;padding:4px 16px 12px;border-bottom:1px solid var(--border)">
      <div class="avatar" style="width:40px;height:40px">${authorAvatar}</div>
      <div>
        <div style="font-size:14px;font-weight:700">${p.authorName||'익명'}</div>
        <div style="font-size:12px;color:var(--text-light)">${timeAgo(p.createdAt)}</div>
      </div>
    </div>

    ${p.content ? `<div class="detail-content" style="padding:16px">${p.content.replace(/\n/g,'<br>')}</div>` : ''}

    ${tagsHtml}

    <div style="display:flex;gap:20px;padding:12px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
      <button class="action-btn like-btn" id="like-btn" data-post-id="${POST_ID}" data-count="${p.likeCount||0}" onclick="toggleLike(this)">
        <svg id="like-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        <span id="like-count">${p.likeCount||0}</span> 공감
      </button>
      <button class="action-btn" onclick="document.getElementById('comment-input').focus()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <span id="comment-count">${p.commentCount||0}</span> 댓글
      </button>
      <button class="action-btn" onclick="sharePost('${POST_ID}','${p.restaurantName||''}')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        공유
      </button>
    </div>

    <div class="comments-section" style="margin-top:16px">
      <div class="comments-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        댓글
      </div>
      <div id="comments-list"><div class="spinner" style="width:24px;height:24px;margin:12px auto"></div></div>
    </div>
  `;

  document.getElementById('detail-loading').classList.add('hidden');
  document.getElementById('detail-content').classList.remove('hidden');

  // Image slider dots
  if (images.length > 1) {
    const slider = document.getElementById('img-slider');
    slider.addEventListener('scroll', () => {
      const idx = Math.round(slider.scrollLeft / slider.offsetWidth);
      document.querySelectorAll('.image-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
    });
  }

  loadComments();
  checkLikeStatus();
}

async function checkLikeStatus() {
  const token = await getIdToken();
  if (!token) return;
  const res = await fetch(`/api/posts/${POST_ID}/like-status`, {
    headers: { 'Authorization': `Bearer ${token}` }
  }).then(r=>r.json());
  if (res.liked) {
    const btn = document.getElementById('like-btn');
    btn.classList.add('liked');
    document.getElementById('like-icon').setAttribute('fill', 'currentColor');
  }
}

async function loadComments() {
  const res = await fetch(`/api/posts/${POST_ID}/comments`).then(r=>r.json());
  const list = document.getElementById('comments-list');
  if (!res.success || !res.comments.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-light);font-size:13px;padding:20px 0">첫 댓글을 남겨보세요!</div>';
    return;
  }
  list.innerHTML = res.comments.map(c => {
    const initial = (c.authorName||'?').charAt(0).toUpperCase();
    const avHtml = c.authorPhoto
      ? `<img src="${c.authorPhoto}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      : initial;
    return `
      <div class="comment-item">
        <div class="avatar" style="width:34px;height:34px;font-size:13px;flex-shrink:0">${avHtml}</div>
        <div class="comment-body">
          <div class="comment-author">${c.authorName||'익명'}</div>
          <div class="comment-text">${c.text||''}</div>
          <div class="comment-time">${timeAgo(c.createdAt)}</div>
        </div>
      </div>`;
  }).join('');
}

async function sendComment() {
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  const token = await getIdToken();
  if (!token) { alert('로그인이 필요합니다'); return; }

  const res = await fetch(`/api/posts/${POST_ID}/comments`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({ text })
  }).then(r=>r.json());

  if (res.success) {
    input.value = '';
    loadComments();
    const cnt = document.getElementById('comment-count');
    if (cnt) cnt.textContent = parseInt(cnt.textContent||0)+1;
  }
}

document.getElementById('comment-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendComment();
});

async function toggleLike(btn) {
  const token = await getIdToken();
  if (!token) { alert('로그인이 필요합니다'); return; }
  const res = await fetch(`/api/posts/${POST_ID}/like`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` }
  }).then(r=>r.json());
  if (res.success) {
    btn.classList.toggle('liked', res.liked);
    document.getElementById('like-icon').setAttribute('fill', res.liked ? 'currentColor' : 'none');
    document.getElementById('like-count').textContent = res.likeCount;
  }
}

async function sharePost(id, name) {
  const url = `${location.origin}/post/${id}`;
  if (navigator.share) { navigator.share({ title: `${name} 맛집 후기`, url }); }
  else { await navigator.clipboard.writeText(url); showToast('링크가 복사되었습니다!'); }
}

function showToast(msg) {
  const wrap = document.querySelector('.toast-wrap');
  if (!wrap) return;
  wrap.innerHTML = `<div class="toast">${msg}</div>`;
  setTimeout(() => wrap.innerHTML='', 2800);
}

// Auth
(async () => {
  const config = await fetch('/api/firebase-config').then(r=>r.json());
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
  const app = initializeApp(config);
  const auth = getAuth(app);
  window._authInstance = auth;
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      document.getElementById('comment-bar').style.display = 'flex';
      const av = document.getElementById('comment-avatar');
      if (av) {
        if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
        else av.textContent = (user.displayName||user.email||'?').charAt(0).toUpperCase();
      }
    }
  });
  loadPost();
})();

async function getIdToken() {
  const auth = window._authInstance;
  if (!auth || !auth.currentUser) return null;
  return auth.currentUser.getIdToken();
}
</script>
{% endblock %}
